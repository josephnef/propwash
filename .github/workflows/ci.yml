name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential

      - name: Install toolchain (macOS)
        if: runner.os == 'macOS'
        run: |
          # cmake ships on GitHub macOS runners; install only if missing.
          # AppleClang builds the Betaflight SITL lib as-is; the macOS link
          # path (extern/CMakeLists.txt) uses -dead_strip instead of the GNU
          # pg.ld linker script.
          cmake --version || brew install cmake

      - name: Configure & build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build -j"$(getconf _NPROCESSORS_ONLN)"

      - name: Core tests (headless, no GPU / no joystick)
        run: |
          # the Godot client tests need a godot binary; run everything else
          ctest --test-dir build --output-on-failure -E 'godot_client|flythrough'

  build-and-test-windows:
    runs-on: windows-latest
    defaults:
      run:
        shell: msys2 {0}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: msys2/setup-msys2@v2
        with:
          msystem: MINGW64
          update: true
          install: >-
            mingw-w64-x86_64-gcc
            mingw-w64-x86_64-cmake
            mingw-w64-x86_64-ninja
            mingw-w64-x86_64-python

      - name: Resolve python3 (native MinGW python understands D:/ paths)
        run: |
          # The MinGW cmake bakes Windows-style script paths (D:/...) into the
          # ctest commands; MSYS2's /usr/bin/python3 treats those as relative
          # POSIX paths and mangles them. The native /mingw64 python handles
          # them. Make sure `python3` resolves to it (it precedes /usr/bin).
          [ -e /mingw64/bin/python3.exe ] || ln -sf /mingw64/bin/python.exe /mingw64/bin/python3.exe
          which python3
          python3 -c "import sys; print(sys.executable)"

      - name: Configure & build (MinGW-w64)
        run: |
          # Ninja generator: avoids the "MinGW Makefiles" gen's refusal to run
          # with sh.exe on PATH (the MSYS2 shell always has it). BF's SITL
          # target links via GNU ld + the pg.ld linker script, same as Linux;
          # the UDP server + serial_tcp use Winsock (-lws2_32, guarded code).
          cmake -B build -G Ninja -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build -j"$(nproc)"

      - name: Core tests (headless, no GPU / no joystick)
        run: |
          # diff_roundtrip and real_tune_hover used to be skipped here: the
          # CLI reconnect after the in-process `save` reboot intermittently
          # timed out on Windows. Root cause was in the vendored dyad's accept
          # loop: an aborted backlog connection fails the accept() itself with
          # WSAECONNRESET on Windows (Linux discards those silently), and dyad
          # fell through and fabricated a CONNECTED stream around
          # INVALID_SOCKET — the bogus ACCEPT event made serial_tcp.c's
          # newest-client-wins onAccept drop the HEALTHY connection every time
          # a retrying client left a corpse in the backlog. Fixed in
          # extern/betaflightext/src/main/compat/dyad/dyad.c
          # (stream_acceptPendingConnections), plus a deterministic client
          # teardown on the reboot path (serial_tcp.c tcpReconfigure). The
          # full core suite runs here now; only the Godot client tests are
          # excluded (no godot binary on this runner).
          ctest --test-dir build --output-on-failure \
            -E 'godot_client|flythrough'

  python-gym:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain + uv
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential
          curl -LsSf https://astral.sh/uv/install.sh | sh

      - name: Sync the gym (uv) — creates the venv CMake detects
        run: |
          cd python/propwash_gym
          "$HOME/.local/bin/uv" sync

      - name: Configure & build core
        run: |
          # configure AFTER uv sync so the gym_hover test picks up the venv
          cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build -j"$(nproc)"

      - name: Gym env-checker + hover (real core in the loop)
        run: ctest --test-dir build --output-on-failure -R gym_hover

  godot-client:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    continue-on-error: true   # informational: the core tests above are the gate
    env:
      # single pin for both runners — they used to drift (Linux pinned by URL,
      # macOS on an unpinned brew cask), which matters now that the client has
      # scene/import files whose format is version-sensitive
      GODOT_VERSION: "4.7.1"
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install toolchain + Godot (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y cmake build-essential unzip xvfb
          curl -sL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_linux.x86_64.zip"
          unzip -q godot.zip
          sudo install -m755 "Godot_v${GODOT_VERSION}-stable_linux.x86_64" /usr/local/bin/godot
          godot --version

      - name: Install toolchain + Godot (macOS)
        if: runner.os == 'macOS'
        run: |
          cmake --version || brew install cmake
          # pinned zip, not `brew install --cask godot`: the cask is unpinned and
          # would silently drift away from the Linux runner's version
          curl -sL -o godot.zip \
            "https://github.com/godotengine/godot/releases/download/${GODOT_VERSION}-stable/Godot_v${GODOT_VERSION}-stable_macos.universal.zip"
          unzip -q godot.zip
          # symlink into the bundle; do NOT copy the executable out of it.
          # Copying breaks the code signature and macOS SIGKILLs the binary
          # (exit 137, "Killed: 9") the moment it runs.
          sudo mv Godot.app /Applications/
          sudo ln -sf /Applications/Godot.app/Contents/MacOS/Godot /usr/local/bin/godot
          godot --version

      - name: Configure & build
        run: |
          cmake -B build -DCMAKE_BUILD_TYPE=RelWithDebInfo
          cmake --build build -j"$(getconf _NPROCESSORS_ONLN)"

      - name: Godot client + fly-through (headless autotest)
        run: |
          ctest --test-dir build --output-on-failure -R 'godot_client|flythrough'
